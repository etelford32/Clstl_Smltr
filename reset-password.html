<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Parker Physics App</title>
    <meta name="description" content="Set a new password for your Parker Physics account.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .card {
            background: rgba(20,18,40,.92); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
            padding: 36px 32px; max-width: 420px; width: 90%; text-align: center;
        }
        .card h1 { font-size: 1.4rem; margin-bottom: 8px; }
        .card p { font-size: .85rem; color: #99a; margin-bottom: 20px; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 16px; }
        .form-group label { display: block; font-size: .78rem; color: #aab; margin-bottom: 6px; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06);
            color: #fff; font-size: .9rem; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: rgba(255,180,0,.5); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
            background: linear-gradient(45deg, #ff8c00, #ffd700); color: #000;
            transition: filter .2s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .error { color: #ff6666; font-size: .78rem; margin-top: 8px; display: none; }
        .success { color: #44cc88; font-size: .85rem; margin-top: 12px; display: none; }
        .pw-strength { height: 3px; border-radius: 2px; background: rgba(255,255,255,.08); margin-top: 6px; overflow: hidden; }
        .pw-strength-bar { height: 100%; width: 0; border-radius: 2px; transition: width .3s, background .3s; }
        a { color: #a080ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <!-- State 1: Set new password -->
    <div id="reset-form-view">
        <h1>Set New Password</h1>
        <p>Enter your new password below. Must be at least 8 characters.</p>

        <form id="reset-form">
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="8+ characters" autocomplete="new-password" required minlength="8">
                <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" required minlength="8">
            </div>
            <button type="submit" class="btn" id="btn-reset">Update Password</button>
            <div class="error" id="error-msg"></div>
        </form>
    </div>

    <!-- State 2: Success -->
    <div id="success-view" style="display:none">
        <div style="font-size:2rem;margin-bottom:12px">&#9989;</div>
        <h1>Password Updated</h1>
        <p>Your password has been changed successfully.</p>
        <a href="signin.html" class="btn" style="display:inline-block;text-decoration:none;margin-top:12px">Sign In &rarr;</a>
    </div>

    <!-- State 3: Error / expired link -->
    <div id="error-view" style="display:none">
        <div style="font-size:2rem;margin-bottom:12px">&#9888;&#65039;</div>
        <h1>Reset Link Expired</h1>
        <p id="error-detail">This password reset link has expired or is invalid. Please request a new one.</p>
        <a href="signin.html" style="display:inline-block;margin-top:12px">Back to Sign In &rarr;</a>
    </div>
</div>

<script type="module">
import { getSupabase, isConfigured } from './js/supabase-config.js';

const formView    = document.getElementById('reset-form-view');
const successView = document.getElementById('success-view');
const errorView   = document.getElementById('error-view');
const errorDetail = document.getElementById('error-detail');
const errorMsg    = document.getElementById('error-msg');
const form        = document.getElementById('reset-form');
const btn         = document.getElementById('btn-reset');
const pwInput     = document.getElementById('new-password');
const confirmInput = document.getElementById('confirm-password');
const pwBar       = document.getElementById('pw-bar');

// Password strength indicator
pwInput?.addEventListener('input', () => {
    const len = pwInput.value.length;
    const pct = Math.min(100, (len / 12) * 100);
    const color = len < 8 ? '#ff4444' : len < 10 ? '#ffaa00' : '#44cc88';
    pwBar.style.width = pct + '%';
    pwBar.style.background = color;
});

// Check that Supabase is available and the URL has a valid token
(async () => {
    if (!isConfigured()) {
        formView.style.display = 'none';
        errorView.style.display = '';
        errorDetail.textContent = 'Authentication service is not configured.';
        return;
    }

    try {
        const sb = await getSupabase();

        // Supabase puts the recovery token in the URL hash after email click.
        // The client auto-detects it via detectSessionInUrl: true.
        // We need to check if a session exists (meaning the token was valid).
        const { data: { session }, error } = await sb.auth.getSession();
        if (error || !session) {
            // Try listening for the PASSWORD_RECOVERY event
            let recovered = false;
            sb.auth.onAuthStateChange((event) => {
                if (event === 'PASSWORD_RECOVERY') recovered = true;
            });
            // Give it a moment to process the URL hash
            await new Promise(r => setTimeout(r, 1500));
            const { data: { session: s2 } } = await sb.auth.getSession();
            if (!s2 && !recovered) {
                formView.style.display = 'none';
                errorView.style.display = '';
                return;
            }
        }
    } catch (e) {
        formView.style.display = 'none';
        errorView.style.display = '';
        errorDetail.textContent = e.message;
        return;
    }

    // Form submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';

        const pw = pwInput.value;
        const confirm = confirmInput.value;

        if (pw.length < 8) {
            errorMsg.textContent = 'Password must be at least 8 characters.';
            errorMsg.style.display = '';
            return;
        }
        if (pw !== confirm) {
            errorMsg.textContent = 'Passwords do not match.';
            errorMsg.style.display = '';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating...';

        try {
            const sb = await getSupabase();
            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = '';
                btn.disabled = false;
                btn.textContent = 'Update Password';
                return;
            }
            formView.style.display = 'none';
            successView.style.display = '';
        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Update Password';
        }
    });
})();
</script>
</body>
</html>
