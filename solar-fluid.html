    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ─── Nav ────────────────────────────────────────────────────── */
nav {
    position:relative; z-index:600;
    height:50px; min-height:50px;
    background:rgba(4,2,16,.93); backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,.07);
    display:flex; align-items:center; padding:0 16px; gap:6px;
}
.nav-brand {
    display:flex; align-items:center; gap:8px;
    font-size:.95rem; font-weight:700; text-decoration:none; white-space:nowrap;
    background:linear-gradient(45deg,#ffd700,#ff8c00);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-right:2px;
}
.nav-logo-img { height:30px; width:auto; border-radius:50%; flex-shrink:0; }
/* nav-menu stretches to fill all remaining space */
.nav-menu { display:flex; align-items:center; gap:4px; flex:1; min-width:0; }
.nav-item {
    padding:5px 10px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12); border-radius:5px;
    color:#ccc; text-decoration:none; font-size:.8rem; white-space:nowrap;
    transition:background .2s, border-color .2s; flex-shrink:0;
}
.nav-item:hover { background:rgba(255,255,255,.16); border-color:rgba(255,200,0,.4); color:#fff; }
.nav-item.active { background:linear-gradient(45deg,#ff8c00,#ffd700); border-color:#ff8c00; color:#000; font-weight:600; }
.nav-drop { position:relative; flex-shrink:0; }
.nav-drop-btn {
    padding:5px 10px; background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12); border-radius:5px;
    color:#ccc; font-size:.8rem; cursor:pointer; font-family:inherit;
    transition:background .2s, border-color .2s; white-space:nowrap;
}
.nav-drop-btn:hover { background:rgba(255,255,255,.16); color:#fff; }
.nav-drop-btn.active { background:linear-gradient(45deg,#ff8c00,#ffd700); border-color:#ff8c00; color:#000; font-weight:600; }
/* Rich dropdown panel */
.nav-drop-menu {
    display:block; position:absolute; top:calc(100% + 5px); left:0;
    background:rgba(5,2,18,.97); backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.11); border-radius:9px;
    padding:6px 0 8px; min-width:268px; z-index:800;
    box-shadow:0 14px 44px rgba(0,0,0,.80);
    opacity:0; visibility:hidden; pointer-events:none;
    transform:translateY(-4px);
    transition:opacity .18s ease, visibility .18s ease, transform .18s ease;
}
.nav-drop:hover .nav-drop-menu, .nav-drop.open .nav-drop-menu {
    opacity:1; visibility:visible; pointer-events:auto; transform:translateY(0);
}
/* Each item in the dropdown */
.nav-drop-link {
    display:flex; align-items:center; gap:11px;
    padding:7px 16px; text-decoration:none; transition:background .15s;
}
.nav-drop-link:hover { background:rgba(255,255,255,.07); }
.nav-drop-link.active .ndl-title { color:#ffd700 !important; font-weight:600; }
.nav-drop-link.active .ndl-icon  { opacity:1; }
.ndl-icon  { font-size:1.05rem; width:20px; text-align:center; flex-shrink:0; opacity:.72; }
.ndl-body  { display:flex; flex-direction:column; gap:1px; }
.ndl-title { color:#c8c8c8; font-size:.82rem; font-weight:500; line-height:1.25; }
.ndl-sub   { color:#484e60; font-size:.70rem; line-height:1.2; }
.nav-drop-link:hover .ndl-title { color:#fff; }
.nav-drop-link:hover .ndl-sub   { color:#7a8090; }
/* Section label inside dropdown */
.nav-drop-section {
    padding:7px 16px 3px; font-size:.63rem; font-weight:700;
    letter-spacing:.09em; color:#3d4255; text-transform:uppercase;
    border-top:1px solid rgba(255,255,255,.06); margin-top:3px;
}
.nav-drop-section:first-child { border-top:none; margin-top:0; padding-top:4px; }
/* Spacer that pushes auth buttons to the far right */
.nav-spacer { flex:1; }
/* Auth */
.nav-auth-sep { width:1px; height:22px; background:rgba(255,255,255,.15); margin:0 3px; flex-shrink:0; }
.nav-login  { background:transparent !important; border-color:rgba(255,255,255,.22) !important; color:#bbb !important; }
.nav-login:hover  { background:rgba(255,255,255,.1) !important; color:#fff !important; border-color:rgba(255,255,255,.4) !important; }
.nav-signup { background:linear-gradient(45deg,#ff8c00,#ffd700) !important; border-color:#ff8c00 !important; color:#000 !important; font-weight:700 !important; letter-spacing:.01em; }
.nav-signup:hover { filter:brightness(1.12) !important; }
/* Burger */
.nav-burger {
    display:none; margin-left:auto;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    border-radius:5px; color:#fff; padding:5px 10px; font-size:1.1rem;
    cursor:pointer; line-height:1; transition:background .2s;
}
.nav-burger:hover { background:rgba(255,255,255,.18); }
@media (max-width:1024px) {
    .nav-burger { display:block; }
    .nav-menu {
        display:none; flex-direction:column; align-items:stretch;
        position:absolute; top:50px; left:0; right:0;
        background:rgba(3,1,14,.98); backdrop-filter:blur(18px);
        border-bottom:1px solid rgba(255,255,255,.1);
        padding:8px 12px 14px; gap:3px; z-index:700;
        max-height:calc(100vh - 50px); overflow-y:auto;
    }
    .nav-menu.open { display:flex; }
    .nav-item, .nav-drop-btn { padding:11px 14px; font-size:.9rem; }
    .nav-drop-menu {
        position:static; box-shadow:none; border-radius:5px; min-width:0;
        background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.07);
        display:none; opacity:1; visibility:visible; transform:none;
        transition:none; pointer-events:auto; padding:2px 0 6px;
    }
    .nav-drop-link { padding:8px 14px 8px 22px; }
    .ndl-sub { display:none; }
    .nav-drop-section { padding:5px 14px 2px 22px; }
    .nav-drop:hover .nav-drop-menu { display:none !important; }
    .nav-drop.open  .nav-drop-menu { display:block !important; }
    .nav-spacer { display:none; }
    .nav-auth-sep { display:none; }
}

    <script>
        // Compact configuration
        const STARS = {
            g: { name: 'G-Type', color: [255, 230, 77], temp: 5500, rot: 2.0 },
            o: { name: 'O-Type', color: [150, 150, 255], temp: 30000, rot: 3.0 },
            m: { name: 'M-Type', color: [255, 102, 51], temp: 3000, rot: 1.0 },
            n: { name: 'Neutron', color: [200, 220, 255], temp: 600000, rot: 10.0 }
        };

        // ── SIRIUS DATA ──
        const SIRIUS_F = {
            A: { color: [206, 216, 255], temp: 9940, mass: 2.06 },
            B: { color: [162, 199, 255], temp: 25000, mass: 1.018 },
            orbit: { period: 50.13, a: 20.0, e: 0.5914, inc: 136.3, T0: 1994.5715 }
        };
        const STM = SIRIUS_F.A.mass + SIRIUS_F.B.mass;
        let siriusMode = false;
        let siriusEpoch = 2026.0;
        let siriusAPos = { x: 0, y: 0 };
        let siriusBPos = { x: 0, y: 0 };

        function solveKF(M, e) {
            let E = M + e * Math.sin(M);
            for (let i = 0; i < 30; i++) {
                const d = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
                E -= d;
                if (Math.abs(d) < 1e-9) break;
            }
            return E;
        }

        function getSiriusPosFluid(epoch) {
            const o = SIRIUS_F.orbit;
            let M = 2 * Math.PI * ((epoch - o.T0) / o.period);
            M = ((M % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            const E = solveKF(M, o.e);
            const nu = 2 * Math.atan2(
                Math.sqrt(1 + o.e) * Math.sin(E / 2),
                Math.sqrt(1 - o.e) * Math.cos(E / 2));
            const r = o.a * (1 - o.e * Math.cos(E));
            const cosI = Math.cos(o.inc * Math.PI / 180);
            return { x: r * Math.cos(nu), y: r * Math.sin(nu) * cosI, r };
        }

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Fluid simulation grid (must be defined before resize() call)
        let N = 64; // Grid resolution
        let fluidGrid = {
            u: [], v: [], // Velocity
            u0: [], v0: [], // Previous velocity
            p: [], // Pressure
            div: [], curl: [], // Divergence and curl
            density: []
        };

        function initFluidGrid() {
            const size = N * N;
            fluidGrid.u = new Float32Array(size);
            fluidGrid.v = new Float32Array(size);
            fluidGrid.u0 = new Float32Array(size);
            fluidGrid.v0 = new Float32Array(size);
            fluidGrid.p = new Float32Array(size);
            fluidGrid.div = new Float32Array(size);
            fluidGrid.curl = new Float32Array(size);
            fluidGrid.density = new Float32Array(size);
        }

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            initFluidGrid();
        }
        window.addEventListener('resize', resize);
        resize();

        // State
        let state = {
            starType: 'g',
            starSize: 50,
            rotation: 30,
            emissionMode: 'parker',
            emissionRate: 15,
            windSpeed: 40,
            viscosity: 5,
            turbulence: 15,
            iterations: 10,
            enableFluid: true,
            enablePressure: true,
            showParticles: true,
            showTrails: true,
            showVelocity: false,
            showPressure: false,
            showVorticity: false,
            showMagnetic: true,
            trailFade: 10,
            paused: false,
            time: 0,
            starRotation: 0
        };

        // Particles
        let particles = [];
        const MAX_PARTICLES = 2000;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                const star = STARS[state.starType];
                const mode = state.emissionMode;

                // In Sirius mode, emit from either star A or B
                if (siriusMode) {
                    const angle = Math.random() * Math.PI * 2;
                    const fromB = Math.random() < 0.2;
                    if (fromB) {
                        const sizeB = Math.max(state.starSize * 0.1, 4);
                        this.x = siriusBPos.x + Math.cos(angle) * sizeB;
                        this.y = siriusBPos.y + Math.sin(angle) * sizeB;
                        const speed = state.windSpeed / 10 * 2.5;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.color = SIRIUS_F.B.color;
                        this._origin = 'B';
                    } else {
                        const r = state.starSize * 0.5;
                        this.x = siriusAPos.x + Math.cos(angle) * r;
                        this.y = siriusAPos.y + Math.sin(angle) * r;
                        const speed = state.windSpeed / 10;
                        this.vx = Math.cos(angle) * speed;
                        this.vy = Math.sin(angle) * speed;
                        this.color = SIRIUS_F.A.color;
                        this._origin = 'A';
                    }
                    this.life = 1.0;
                    this.maxLife = 2 + Math.random() * 3;
                    this.size = 1.5 + Math.random();
                    this.trail = [];
                    return;
                }

                // Position on star surface
                let angle = Math.random() * Math.PI * 2;
                if (mode === 'hole') angle = Math.PI * 0.5 + (Math.random() - 0.5) * 0.5;
                if (mode === 'flare') angle = state.time * 0.5;

                const r = state.starSize * 0.5;
                this.x = canvas.width / 2 + Math.cos(angle) * r;
                this.y = canvas.height / 2 + Math.sin(angle) * r;

                // Velocity
                const speed = state.windSpeed / 10;
                const spread = mode === 'flare' ? 0.1 : (mode === 'cme' ? 0.3 : 1.0);
                const finalAngle = angle + (Math.random() - 0.5) * spread;

                this.vx = Math.cos(finalAngle) * speed;
                this.vy = Math.sin(finalAngle) * speed;

                this.life = 1.0;
                this.maxLife = 2 + Math.random() * 3;
                this.size = 1.5 + Math.random();
                this.trail = [];
                this.color = star.color;
            }

            update(dt) {
                // Parker spiral
                if (state.emissionMode === 'parker') {
                    const dx = this.x - canvas.width / 2;
                    const dy = this.y - canvas.height / 2;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    if (r > state.starSize * 0.5) {
                        const omega = state.rotation / 100 * (state.starSize / r);
                        this.vx += -dy / r * omega * dt * 60;
                        this.vy += dx / r * omega * dt * 60;
                    }
                }

                // Sirius binary: mutual gravitational attraction + capture
                if (siriusMode) {
                    // Gravity from Sirius A (2.06 M☉)
                    const dxA = siriusAPos.x - this.x;
                    const dyA = siriusAPos.y - this.y;
                    const dA = Math.sqrt(dxA * dxA + dyA * dyA);
                    const captureA = state.starSize * 0.35;
                    if (dA < captureA && dA > 0) {
                        this.life = 0; // captured
                    } else if (dA < 100 && dA > 2) {
                        const gravA = 0.8 / (dA * dA + 8);
                        this.vx += (dxA / dA) * gravA * dt * 60;
                        this.vy += (dyA / dA) * gravA * dt * 60;
                    }

                    // Gravity from Sirius B (1.018 M☉)
                    const dxB = siriusBPos.x - this.x;
                    const dyB = siriusBPos.y - this.y;
                    const dB = Math.sqrt(dxB * dxB + dyB * dyB);
                    const captureB = Math.max(state.starSize * 0.07, 3);
                    if (dB < captureB && dB > 0) {
                        this.life = 0; // captured
                    } else if (dB < 60 && dB > 2) {
                        const gravB = 0.4 / (dB * dB + 8);
                        this.vx += (dxB / dB) * gravB * dt * 60;
                        this.vy += (dyB / dB) * gravB * dt * 60;
                        // X-ray heating near white dwarf
                        if (dB < 25) {
                            const heat = 1 - dB / 25;
                            this.color = [
                                Math.round(162 + heat * 40),
                                Math.round(199 + heat * 30),
                                255
                            ];
                        }
                    }
                }

                // Fluid interaction
                if (state.enableFluid) {
                    const gx = Math.floor((this.x / canvas.width) * N);
                    const gy = Math.floor((this.y / canvas.height) * N);
                    if (gx >= 0 && gx < N && gy >= 0 && gy < N) {
                        const idx = gy * N + gx;
                        const scale = 0.3;
                        this.vx += fluidGrid.u[idx] * scale;
                        this.vy += fluidGrid.v[idx] * scale;
                        fluidGrid.density[idx] += 0.1;
                    }
                }

                // Turbulence
                if (state.turbulence > 0) {
                    const turb = state.turbulence / 100 * 0.3;
                    this.vx += (Math.random() - 0.5) * turb;
                    this.vy += (Math.random() - 0.5) * turb;
                }

                // Update position
                this.x += this.vx * dt * 60;
                this.y += this.vy * dt * 60;
                this.life -= dt / this.maxLife;

                // Trail
                if (state.showTrails) {
                    this.trail.push({ x: this.x, y: this.y, a: this.life });
                    if (this.trail.length > 30) this.trail.shift();
                }

                if (this.life <= 0 || this.x < -100 || this.x > canvas.width + 100 ||
                    this.y < -100 || this.y > canvas.height + 100) {
                    this.reset();
                }
            }

            draw() {
                if (!state.showParticles) return;

                // Trail
                if (state.showTrails && this.trail.length > 1) {
                    ctx.strokeStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.life * 0.2})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.stroke();
                }

                // Particle
                ctx.fillStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Navier-Stokes fluid solver
        function IX(x, y) { return Math.max(0, Math.min(N-1, x)) + Math.max(0, Math.min(N-1, y)) * N; }

        function setBoundary(b, x) {
            for (let i = 1; i < N - 1; i++) {
                x[IX(i, 0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                x[IX(i, N-1)] = b === 2 ? -x[IX(i, N-2)] : x[IX(i, N-2)];
            }
            for (let j = 1; j < N - 1; j++) {
                x[IX(0, j)] = b === 1 ? -x[IX(1, j)] : x[IX(1, j)];
                x[IX(N-1, j)] = b === 1 ? -x[IX(N-2, j)] : x[IX(N-2, j)];
            }
        }

        function diffuse(b, x, x0, diff, dt) {
            const a = dt * diff * (N - 2) * (N - 2);
            for (let k = 0; k < state.iterations; k++) {
                for (let j = 1; j < N - 1; j++) {
                    for (let i = 1; i < N - 1; i++) {
                        x[IX(i,j)] = (x0[IX(i,j)] + a * (
                            x[IX(i+1,j)] + x[IX(i-1,j)] +
                            x[IX(i,j+1)] + x[IX(i,j-1)]
                        )) / (1 + 4 * a);
                    }
                }
                setBoundary(b, x);
            }
        }

        function project(u, v, p, div) {
            const h = 1.0 / N;

            // Calculate divergence
            for (let j = 1; j < N - 1; j++) {
                for (let i = 1; i < N - 1; i++) {
                    div[IX(i,j)] = -0.5 * h * (
                        u[IX(i+1,j)] - u[IX(i-1,j)] +
                        v[IX(i,j+1)] - v[IX(i,j-1)]
                    );
                    p[IX(i,j)] = 0;
                }
            }
            setBoundary(0, div);
            setBoundary(0, p);

            // Solve pressure
            for (let k = 0; k < state.iterations; k++) {
                for (let j = 1; j < N - 1; j++) {
                    for (let i = 1; i < N - 1; i++) {
                        p[IX(i,j)] = (div[IX(i,j)] +
                            p[IX(i+1,j)] + p[IX(i-1,j)] +
                            p[IX(i,j+1)] + p[IX(i,j-1)]
                        ) / 4;
                    }
                }
                setBoundary(0, p);
            }

            // Subtract pressure gradient
            for (let j = 1; j < N - 1; j++) {
                for (let i = 1; i < N - 1; i++) {
                    u[IX(i,j)] -= 0.5 * (p[IX(i+1,j)] - p[IX(i-1,j)]) / h;
                    v[IX(i,j)] -= 0.5 * (p[IX(i,j+1)] - p[IX(i,j-1)]) / h;
                }
            }
            setBoundary(1, u);
            setBoundary(2, v);
        }

        function advect(b, d, d0, u, v, dt) {
            const dt0 = dt * (N - 2);
            for (let j = 1; j < N - 1; j++) {
                for (let i = 1; i < N - 1; i++) {
                    let x = i - dt0 * u[IX(i,j)];
                    let y = j - dt0 * v[IX(i,j)];

                    x = Math.max(0.5, Math.min(N - 1.5, x));
                    y = Math.max(0.5, Math.min(N - 1.5, y));

                    const i0 = Math.floor(x), i1 = i0 + 1;
                    const j0 = Math.floor(y), j1 = j0 + 1;

                    const s1 = x - i0, s0 = 1 - s1;
                    const t1 = y - j0, t0 = 1 - t1;

                    d[IX(i,j)] =
                        s0 * (t0 * d0[IX(i0,j0)] + t1 * d0[IX(i0,j1)]) +
                        s1 * (t0 * d0[IX(i1,j0)] + t1 * d0[IX(i1,j1)]);
                }
            }
            setBoundary(b, d);
        }

        function velocityStep(dt) {
            if (!state.enableFluid) return;

            const visc = state.viscosity / 1000;

            // Diffuse
            diffuse(1, fluidGrid.u0, fluidGrid.u, visc, dt);
            diffuse(2, fluidGrid.v0, fluidGrid.v, visc, dt);

            // Project
            if (state.enablePressure) {
                project(fluidGrid.u0, fluidGrid.v0, fluidGrid.p, fluidGrid.div);
            }

            // Advect
            advect(1, fluidGrid.u, fluidGrid.u0, fluidGrid.u0, fluidGrid.v0, dt);
            advect(2, fluidGrid.v, fluidGrid.v0, fluidGrid.u0, fluidGrid.v0, dt);

            // Project again
            if (state.enablePressure) {
                project(fluidGrid.u, fluidGrid.v, fluidGrid.p, fluidGrid.div);
            }

            // Calculate curl
            for (let j = 1; j < N - 1; j++) {
                for (let i = 1; i < N - 1; i++) {
                    fluidGrid.curl[IX(i,j)] =
                        (fluidGrid.v[IX(i+1,j)] - fluidGrid.v[IX(i-1,j)]) -
                        (fluidGrid.u[IX(i,j+1)] - fluidGrid.u[IX(i,j-1)]);
                }
            }

            // Density decay
            for (let i = 0; i < N * N; i++) {
                fluidGrid.density[i] *= 0.98;
            }
        }

        // Drawing functions
        function drawStar() {
            const star = siriusMode ? { color: SIRIUS_F.A.color } : STARS[state.starType];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const pulse = Math.sin(state.time * 2) * 0.1 + 1;
            const size = state.starSize * pulse;

            // In Sirius mode, offset star A from center
            let axPos = { x: cx, y: cy };
            if (siriusMode) {
                siriusEpoch += 0.016 * 1.5;
                const pos = getSiriusPosFluid(siriusEpoch);
                const qA = SIRIUS_F.B.mass / STM;
                const qB = SIRIUS_F.A.mass / STM;
                const scale = 3.0;
                axPos = { x: cx - pos.x * qA * scale, y: cy - pos.y * qA * scale };
                siriusAPos = { x: axPos.x, y: axPos.y };
                siriusBPos = { x: cx + pos.x * qB * scale, y: cy + pos.y * qB * scale };

                // Draw orbital paths (faint)
                ctx.strokeStyle = 'rgba(206,216,255,0.06)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                for (let i = 0; i <= 120; i++) {
                    const t = SIRIUS_F.orbit.T0 + (i / 120) * SIRIUS_F.orbit.period;
                    const p = getSiriusPosFluid(t);
                    const px = cx + p.x * qB * scale;
                    const py = cy + p.y * qB * scale;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();

                // Draw Sirius B
                const sB = SIRIUS_F.B.color;
                const sizeB = Math.max(state.starSize * 0.1, 4);
                const pB = Math.sin(state.time * 3) * 0.15 + 1;
                const gB = ctx.createRadialGradient(siriusBPos.x, siriusBPos.y, 0, siriusBPos.x, siriusBPos.y, sizeB * 2 * pB);
                gB.addColorStop(0, `rgba(${sB[0]},${sB[1]},${sB[2]},1.0)`);
                gB.addColorStop(0.3, `rgba(${sB[0]},${sB[1]},${sB[2]},0.5)`);
                gB.addColorStop(1, `rgba(${sB[0]},${sB[1]},${sB[2]},0)`);
                ctx.fillStyle = gB;
                ctx.beginPath();
                ctx.arc(siriusBPos.x, siriusBPos.y, sizeB * 2 * pB, 0, Math.PI * 2);
                ctx.fill();

                // Update HUD temperature
                document.getElementById('temp').textContent = '9940/25000';
            }

            const grad = ctx.createRadialGradient(axPos.x, axPos.y, 0, axPos.x, axPos.y, size);
            grad.addColorStop(0, `rgba(${star.color[0]}, ${star.color[1]}, ${star.color[2]}, 0.9)`);
            grad.addColorStop(0.5, `rgba(${star.color[0]}, ${star.color[1]}, ${star.color[2]}, 0.5)`);
            grad.addColorStop(1, `rgba(${star.color[0]}, ${star.color[1]}, ${star.color[2]}, 0)`);

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(axPos.x, axPos.y, size, 0, Math.PI * 2);
            ctx.fill();

            state.starRotation += state.rotation / 100 * 0.016;
        }

        function drawMagneticField() {
            if (!state.showMagnetic) return;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.2)';
            ctx.lineWidth = 0.5;

            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 + state.starRotation;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * state.starSize * 0.5,
                          cy + Math.sin(angle) * state.starSize * 0.5);

                for (let j = 1; j < 80; j++) {
                    const r = state.starSize * 0.5 + j * 5;
                    const theta = angle - (j / 80) * state.rotation / 10;
                    ctx.lineTo(cx + Math.cos(theta) * r, cy + Math.sin(theta) * r);
                }
                ctx.stroke();
            }
        }

        function drawFluidViz() {
            const cellW = canvas.width / N;
            const cellH = canvas.height / N;

            if (state.showPressure) {
                for (let j = 0; j < N; j++) {
                    for (let i = 0; i < N; i++) {
                        const p = Math.abs(fluidGrid.p[IX(i,j)]);
                        if (p > 0.001) {
                            ctx.fillStyle = `rgba(255, 100, 0, ${Math.min(p * 10, 0.5)})`;
                            ctx.fillRect(i * cellW, j * cellH, cellW, cellH);
                        }
                    }
                }
            }

            if (state.showVorticity) {
                for (let j = 0; j < N; j++) {
                    for (let i = 0; i < N; i++) {
                        const c = fluidGrid.curl[IX(i,j)];
                        if (Math.abs(c) > 0.01) {
                            const color = c > 0 ? [0, 255, 100] : [255, 0, 100];
                            ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${Math.min(Math.abs(c) * 5, 0.4)})`;
                            ctx.fillRect(i * cellW, j * cellH, cellW, cellH);
                        }
                    }
                }
            }

            if (state.showVelocity) {
                ctx.strokeStyle = 'rgba(0, 255, 100, 0.3)';
                ctx.lineWidth = 1;
                const step = 4;
                for (let j = 0; j < N; j += step) {
                    for (let i = 0; i < N; i += step) {
                        const u = fluidGrid.u[IX(i,j)];
                        const v = fluidGrid.v[IX(i,j)];
                        const mag = Math.sqrt(u*u + v*v);
                        if (mag > 0.05) {
                            const x = (i + 0.5) * cellW;
                            const y = (j + 0.5) * cellH;
                            const scale = 15;
                            ctx.beginPath();
                            ctx.moveTo(x, y);
                            ctx.lineTo(x + u * scale, y + v * scale);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // Main loop
        let lastTime = performance.now();
        let fps = 60;

        function animate() {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            if (!state.paused) {
                fps = Math.round(1 / dt);
                state.time += dt;

                // Fade trail
                ctx.fillStyle = `rgba(0, 0, 0, ${state.trailFade / 100})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Spawn particles
                const toSpawn = Math.min(state.emissionRate, MAX_PARTICLES - particles.length);
                for (let i = 0; i < toSpawn; i++) {
                    particles.push(new Particle());
                }

                // Update fluid
                velocityStep(dt);

                // Draw
                drawFluidViz();
                drawMagneticField();
                drawStar();

                // Update particles
                let totalVel = 0, totalDiv = 0, totalCurl = 0, totalPressure = 0;
                particles.forEach(p => {
                    p.update(dt);
                    p.draw();
                    totalVel += Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                });

                // Stats
                for (let i = 0; i < N * N; i++) {
                    totalDiv += Math.abs(fluidGrid.div[i]);
                    totalCurl += Math.abs(fluidGrid.curl[i]);
                    totalPressure += Math.abs(fluidGrid.p[i]);
                }

                // Update HUD
                document.getElementById('simMode').textContent = state.emissionMode.toUpperCase();
                document.getElementById('fps').textContent = fps;
                document.getElementById('particles').textContent = particles.length;
                document.getElementById('dt').textContent = (dt * 1000).toFixed(1) + 'ms';
                document.getElementById('vel').textContent = (totalVel / particles.length * 50).toFixed(0);
                document.getElementById('dens').textContent = (fluidGrid.density.reduce((a,b) => a+b, 0) / (N*N)).toFixed(3);
                document.getElementById('div').textContent = (totalDiv / (N*N)).toFixed(4);
                document.getElementById('curl').textContent = (totalCurl / (N*N)).toFixed(4);
                document.getElementById('pressure').textContent = (totalPressure / (N*N)).toFixed(4);
                document.getElementById('temp').textContent = STARS[state.starType].temp;

                document.getElementById('statFps').textContent = fps;
                document.getElementById('statParts').textContent = particles.length;
                document.getElementById('statDiv').textContent = (totalDiv / (N*N)).toFixed(3);
                document.getElementById('statCurl').textContent = (totalCurl / (N*N)).toFixed(3);
            }

            requestAnimationFrame(animate);
        }

        // Controls
        function bindControl(id, prop, display, format = v => v) {
            const el = document.getElementById(id);
            const val = document.getElementById(display);
            el.value = state[prop];
            if (val) val.textContent = format(state[prop]);
            el.addEventListener('input', e => {
                state[prop] = el.type === 'checkbox' ? el.checked :
                              el.type === 'range' ? parseFloat(e.target.value) : e.target.value;
                if (val) val.textContent = format(state[prop]);
            });
        }

        // Sirius preset binding
        document.getElementById('presetSelect').addEventListener('change', e => {
            if (e.target.value === 'sirius') {
                siriusMode = true;
                siriusEpoch = 2026.0;
                state.starType = 'g'; // closest base type
                document.getElementById('starType').value = 'g';
                document.getElementById('siriusInfo').style.display = 'block';
                document.getElementById('simMode').textContent = 'SIRIUS';
                particles = [];
                initFluidGrid();
            } else {
                siriusMode = false;
                document.getElementById('siriusInfo').style.display = 'none';
                particles = [];
                initFluidGrid();
            }
        });

        bindControl('starType', 'starType');
        bindControl('starSize', 'starSize', 'starSizeVal');
        bindControl('rotation', 'rotation', 'rotationVal');
        bindControl('emissionMode', 'emissionMode');
        bindControl('emissionRate', 'emissionRate', 'emissionRateVal');
        bindControl('windSpeed', 'windSpeed', 'windSpeedVal');
        bindControl('viscosity', 'viscosity', 'viscosityVal', v => (v/100).toFixed(2));
        bindControl('turbulence', 'turbulence', 'turbulenceVal');
        bindControl('iterations', 'iterations', 'iterationsVal');
        bindControl('trailFade', 'trailFade', 'trailFadeVal');

        bindControl('enableFluid', 'enableFluid');
        bindControl('enablePressure', 'enablePressure');
        bindControl('showParticles', 'showParticles');
        bindControl('showTrails', 'showTrails');
        bindControl('showVelocity', 'showVelocity');
        bindControl('showPressure', 'showPressure');
        bindControl('showVorticity', 'showVorticity');
        bindControl('showMagnetic', 'showMagnetic');

        document.getElementById('resetBtn').addEventListener('click', () => {
            particles = [];
            initFluidGrid();
            state.time = 0;
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            state.paused = !state.paused;
            document.getElementById('pauseBtn').textContent = state.paused ? 'RESUME [SPACE]' : 'PAUSE [SPACE]';
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const data = {
                timestamp: Date.now(),
                state: state,
                particles: particles.length,
                stats: {
                    fps: fps,
                    divergence: fluidGrid.div.reduce((a,b) => a+Math.abs(b), 0) / (N*N),
                    vorticity: fluidGrid.curl.reduce((a,b) => a+Math.abs(b), 0) / (N*N)
                }
            };
            console.log('EXPORT:', data);
            alert('Data exported to console');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === ' ') { e.preventDefault(); document.getElementById('pauseBtn').click(); }
            if (e.key === 'r') document.getElementById('resetBtn').click();
            if (e.key === 'e') document.getElementById('exportBtn').click();
            if (e.key >= '1' && e.key <= '4') {
                document.querySelectorAll('.section')[parseInt(e.key) - 1].classList.toggle('collapsed');
            }
        });

        // Section collapse
        document.querySelectorAll('.section-title').forEach(title => {
            title.addEventListener('click', () => {
                title.parentElement.classList.toggle('collapsed');
            });
        });

        animate();
