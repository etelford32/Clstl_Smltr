# Cargo configuration for WASM builds

[target.wasm32-unknown-unknown]
# Enable JavaScript support for random number generation in WASM
# The wasm_js cfg flag enables getrandom's JS backend
rustflags = [
    "--cfg=web_sys_unstable_apis",
]

# Force all dependencies to use JavaScript-compatible getrandom
[env]
CARGO_BUILD_RUSTFLAGS = "--cfg=getrandom_backend=\"js\""
