# ─────────────────────────────────────────────────────────────────────────────
# Parker Physics — Raspberry Pi nginx config
#
# What this does:
#   1. Serves all static HTML / JS / assets from the repo
#   2. Transparently rewrites NOAA/DONKI hostnames in served HTML+JS via
#      sub_filter so the browser fetches /noaa-swpc/* and /nasa-donki/*
#      (stays on-Pi, no browser CORS, no rate-limit risk)
#   3. proxy_cache caches NOAA responses for 5 min, DONKI for 15 min
#      — keeps serving stale data if upstream is unreachable
#   4. /api/swmf/ pre-wired for future BATS-R-US model output (volume mount)
#
# Memory footprint on Pi 4: ~50 MB RSS total
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Proxy cache zones (defined here at http{} level) ──────────────────────

    proxy_cache_path /var/cache/nginx/noaa
        levels=1:2
        keys_zone=noaa:8m
        max_size=50m
        inactive=30m
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/donki
        levels=1:2
        keys_zone=donki:4m
        max_size=10m
        inactive=60m
        use_temp_path=off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json
               text/javascript text/plain;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Transparent hostname rewrite ──────────────────────────────────────
        # Applied to HTML and JS responses so the browser never calls NOAA
        # directly — all API traffic routes through this nginx instance.
        #
        # swpc-feed.js has:
        #   'https://services.swpc.noaa.gov/json/...'
        #   'https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/rest/...'
        # After rewrite these become:
        #   '/noaa-swpc/json/...'   → location /noaa-swpc/  (5-min cache)
        #   '/nasa-donki/WS/rest/...' → location /nasa-donki/ (15-min cache)
        sub_filter 'https://services.swpc.noaa.gov'         '/noaa-swpc';
        sub_filter 'https://kauai.ccmc.gsfc.nasa.gov/DONKI' '/nasa-donki';
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;

        # ── Static file serving ───────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── NOAA SWPC proxy — 5-minute cache ─────────────────────────────────
        location /noaa-swpc/ {
            proxy_pass https://services.swpc.noaa.gov/;

            proxy_ssl_server_name on;
            proxy_set_header Host services.swpc.noaa.gov;
            proxy_set_header User-Agent "ParkerPhysics-PiCache/1.0";
            proxy_set_header Accept "application/json";

            # Cache
            proxy_cache              noaa;
            proxy_cache_valid        200 5m;
            proxy_cache_valid        404 1m;
            proxy_cache_key          "$scheme$proxy_host$request_uri";
            proxy_cache_use_stale    error timeout updating
                                     http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock         on;

            # Expose cache hit/miss for debugging
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Access-Control-Allow-Origin * always;
        }

        # ── NASA DONKI proxy — 15-minute cache ───────────────────────────────
        location /nasa-donki/ {
            proxy_pass https://kauai.ccmc.gsfc.nasa.gov/DONKI/;

            proxy_ssl_server_name on;
            proxy_set_header Host kauai.ccmc.gsfc.nasa.gov;
            proxy_set_header User-Agent "ParkerPhysics-PiCache/1.0";
            proxy_set_header Accept "application/json";

            proxy_cache              donki;
            proxy_cache_valid        200 15m;
            proxy_cache_valid        404 2m;
            proxy_cache_key          "$scheme$proxy_host$request_uri";
            proxy_cache_use_stale    error timeout updating
                                     http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock         on;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Access-Control-Allow-Origin * always;
        }

        # ── BATS-R-US model output (pre-wired, serves from Docker volume) ─────
        # When SWMF Phase 0 is complete, bind-mount /data/results here.
        # The frontend will call /api/swmf/latest.json for model forecasts.
        location /api/swmf/ {
            alias /data/results/;
            autoindex on;
            default_type application/json;
            add_header Cache-Control "public, max-age=300" always;
            add_header Access-Control-Allow-Origin * always;
        }

        # ── Health endpoint ───────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"parker-physics-pi"}\n';
            add_header Content-Type application/json;
        }
    }
}
