name: Weather grid refresh (hourly)

# Vercel Hobby allows only one cron per day per deployment. This workflow
# runs on GitHub Actions' free cron tier instead (up to once per 5 min; we
# use hourly to match our data freshness target). Vercel's own cron at
# 0 6 * * * remains wired up as a daily safety net.
#
# What it does: POST /api/weather/refresh with the shared CRON_SECRET.
# That endpoint fetches Open-Meteo's 648-location grid and writes one row
# to Supabase's weather_grid_cache table, which /api/weather/grid reads.
#
# ── Required GitHub configuration ──────────────────────────────────
#   Repository Secret: CRON_SECRET
#     Same value as the Vercel environment variable CRON_SECRET.
#   Repository Variable: WEATHER_REFRESH_URL  (optional)
#     Full URL to POST. Defaults to https://clstl-smltr.vercel.app/api/weather/refresh.
#     Override if the production domain changes.

on:
  schedule:
    # Top of every hour (UTC). GitHub may delay by ~5–15 min under load,
    # which is fine — the endpoint is idempotent and the lazy-refresh
    # fallback in /api/weather/grid handles sub-hourly gaps.
    - cron: '0 * * * *'
  workflow_dispatch: {}

# Cancel an in-flight run if a new one starts (rare, but avoids double-writes).
concurrency:
  group: weather-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: POST /api/weather/refresh
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REFRESH_URL: ${{ vars.WEATHER_REFRESH_URL || 'https://clstl-smltr.vercel.app/api/weather/refresh' }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repository secret is not set"
            exit 1
          fi

          # -f makes curl exit non-zero on HTTP >=400 so a 500 from Vercel
          # surfaces as a failed workflow run (which sends email alerts).
          # -sS keeps output silent but prints errors.
          # --retry 3 with 30-second backoff handles transient Vercel cold-starts.
          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            --retry 3 --retry-delay 30 --retry-all-errors \
            "${REFRESH_URL}")

          echo "HTTP ${http_status}"
          cat response.json || true

          if [ "${http_status}" -ge 400 ]; then
            echo "::error::Refresh endpoint returned ${http_status}"
            exit 1
          fi
