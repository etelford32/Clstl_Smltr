name: DSMC backend E2E

on:
  push:
    branches:
      - main
    paths:
      - 'dsmc/**'
      - 'js/upper-atmosphere-*.js'
      - 'upper-atmosphere.html'
      - 'tests/upper-atmosphere-e2e.spec.js'
      - '.github/workflows/dsmc-e2e.yml'
      - 'playwright.config.js'
  pull_request:
    paths:
      - 'dsmc/**'
      - 'js/upper-atmosphere-*.js'
      - 'upper-atmosphere.html'
      - 'tests/upper-atmosphere-e2e.spec.js'
      - '.github/workflows/dsmc-e2e.yml'
      - 'playwright.config.js'
  workflow_dispatch:

# One run per ref — a second push supersedes the first.
concurrency:
  group: dsmc-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Auto → SPARTA pill path
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
      DSMC_API_URL: 'http://localhost:8001'
      TEST_BASE_URL: 'http://localhost:8000'
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Docker buildx gives us layer caching via GHA cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache DSMC image layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: dsmc-buildx-${{ hashFiles('dsmc/Dockerfile', 'dsmc/pipeline/requirements.txt') }}
          restore-keys: |
            dsmc-buildx-

      - name: Build DSMC image (no SPARTA — bootstrap only)
        uses: docker/build-push-action@v5
        with:
          context: ./dsmc
          file: ./dsmc/Dockerfile
          build-args: |
            BUILD_SPARTA=0
          tags: parkerphysics/dsmc:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Avoid unbounded cache growth.
      - name: Rotate buildx cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Seed bootstrap SPARTA tables
        working-directory: dsmc
        run: |
          docker compose -f docker-compose.ci.yml run --rm dsmc \
            python3 /app/sparta/generate_tables.py --use-msis-fallback

      - name: Start DSMC API
        working-directory: dsmc
        run: docker compose -f docker-compose.ci.yml up -d dsmc

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fs "$DSMC_API_URL/health" >/dev/null; then
              echo "healthy after $i s"; exit 0
            fi
            sleep 1
          done
          echo "DSMC /health never responded — dumping logs"
          docker compose -f dsmc/docker-compose.ci.yml logs --no-color dsmc
          exit 1

      - name: Verify profile endpoint returns SPARTA-bootstrap model
        run: |
          body="$(curl -fs "$DSMC_API_URL/v1/atmosphere/profile?f107=150&ap=15&n_points=6")"
          echo "$body" | head -c 600; echo
          echo "$body" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'samples' in d and len(d['samples']) >= 6, 'no samples'
          model = d.get('model', '')
          assert model.startswith('SPARTA'), f'unexpected model: {model!r}'
          print(f'✓ profile returns model={model!r} with {len(d[\"samples\"])} samples')
          "

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Start dev-server (background)
        run: |
          PORT=8000 node dev-server.mjs > /tmp/dev-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fs "$TEST_BASE_URL" >/dev/null; then
              echo "dev-server up after $i s"; exit 0
            fi
            sleep 1
          done
          echo "dev-server never responded"
          cat /tmp/dev-server.log
          exit 1

      - name: Run Playwright E2E
        run: npx playwright test tests/upper-atmosphere-e2e.spec.js --reporter=list

      - name: DSMC logs (always)
        if: always()
        run: docker compose -f dsmc/docker-compose.ci.yml logs --no-color dsmc | tail -200

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down DSMC stack
        if: always()
        working-directory: dsmc
        run: docker compose -f docker-compose.ci.yml down -v
