name: Deploy Celestial Simulator to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build Celestial Studio (web version)
        run: |
          pygbag --build celestial_studio.py || true

      - name: Ensure build/web directory exists
        run: mkdir -p build/web

      - name: Copy all static HTML/JS/CSS files to web build
        run: |
          # Copy all top-level HTML files
          for f in *.html; do
            cp "$f" build/web/ && echo "Copied $f"
          done
          # Copy any top-level CSS/JS if present
          for f in *.css *.js 2>/dev/null; do
            [ -f "$f" ] && cp "$f" build/web/ && echo "Copied $f"
          done
          # Copy JS modules directory
          if [ -d "js" ]; then
            cp -r js build/web/js && echo "Copied js/"
          fi
          # Copy API routes
          if [ -d "api" ]; then
            cp -r api build/web/api && echo "Copied api/"
          fi
          # Copy Rust WASM build output if present
          if [ -d "rust/www" ]; then
            mkdir -p build/web/rust/www
            cp -r rust/www/* build/web/rust/www/ && echo "Copied rust/www/"
          fi
          # Copy static assets (images, logos, etc.)
          for f in *.png *.jpg *.svg *.ico *.webp 2>/dev/null; do
            [ -f "$f" ] && cp "$f" build/web/ && echo "Copied $f"
          done
          # Copy sitemap/robots
          for f in sitemap.xml robots.txt 2>/dev/null; do
            [ -f "$f" ] && cp "$f" build/web/ && echo "Copied $f"
          done
          # List what we're deploying
          echo "--- build/web contents ---"
          ls -lhR build/web/ | head -60

      - name: Create project README in build
        run: |
          cat > build/web/README.md << 'EOF'
          # Parker Physics App — etelford32

          Interactive 3D/2D celestial simulations and real-time space weather:
          - **threejs.html** — Solar System simulation (real-time planet positions)
          - **earth.html** — Earth magnetosphere, weather, satellite data
          - **sun.html** — Solar physics (chromosphere, corona, interior)
          - **space-weather.html** — Space weather dashboard (NOAA/NASA live data)
          - **star3d.html** — Three.js 3D stellar simulator
          - **dashboard.html** — User dashboard

          https://parkersphysics.com
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Parker Physics App — ${{ github.ref_name }}'

  build-docker:
    runs-on: ubuntu-latest
    # NOTE: GitHub Actions does NOT allow `secrets.*` in job-level `if:`
    # expressions — secrets aren't part of the workflow-validation context.
    # The canonical workaround is a leading "secrets-check" step that
    # reads the secret into an env var (which IS allowed) and exposes a
    # boolean output the rest of the steps gate on. Each subsequent step
    # then no-ops cleanly when DOCKER_USERNAME isn't configured, instead
    # of the whole workflow failing to parse.
    continue-on-error: true   # Don't fail the whole workflow if Docker build fails
    steps:
      - name: Check Docker Hub credentials
        id: secrets-check
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$DOCKER_USERNAME" ]; then
            echo "available=true"  >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKER_USERNAME secret not set — skipping Docker build."
          fi

      - name: Checkout
        if: steps.secrets-check.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.secrets-check.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.secrets-check.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        if: steps.secrets-check.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/star-simulation:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/star-simulation:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/star-simulation:buildcache,mode=max
